  description: AI voice agents — assistants, calls, campaigns, leads, knowledge bases, WhatsApp, SMS & SIP trunks.
  icon: https://mcp.famulor.io/logo.png
source:
  project: https://github.com/bekservice/Famulor-MCP
remote:
  transport_type: streamable-http
  url: https://mcp.famulor.io/mcp
oauth:
  - provider: famulor
    secret: famulor.access_token
    env: ''
dynamic:
  tools: true
